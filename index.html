<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETAP Expert - James</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --accent: #da3633; --blue: #58a6ff; --green: #3fb950; }
        body { background-color: var(--bg); color: #c9d1d9; font-family: 'Segoe UI', sans-serif; padding-bottom: 50px; }
        .header-main { background: #1f2328; color: white; padding: 20px; text-align: center; border-bottom: 3px solid var(--accent); margin-bottom: 20px;}
        .card-decision { background: var(--card); border: 2px solid var(--border); border-radius: 15px; padding: 25px; transition: 0.3s; cursor: pointer; text-align: center; height: 100%; display: flex; flex-direction: column; justify-content: center;}
        .card-decision:hover { border-color: var(--blue); transform: translateY(-5px); }
        #area-passos { display: none; margin-top: 20px; }
        .passo-box { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 15px; margin-bottom: 15px; }
        .ferramenta-badge { background: #010409; border: 1px solid #444; color: var(--blue); padding: 2px 8px; border-radius: 4px; font-family: monospace; font-size: 0.8rem; margin-right: 5px;}
    </style>
</head>
<body>

<div class="header-main">
    <h5 class="m-0 text-uppercase fw-bold">Guia de Decisão 1783-ETAP</h5>
    <small class="text-muted">JAMES - AUTOMAÇÃO INDUSTRIAL</small>
</div>

<div class="container">
    <div class="row g-4" id="pergunta-inicial">
        <div class="col-12 text-center mb-2">
            <h5 class="text-white">Você sabe o endereço IP do módulo?</h5>
        </div>
        <div class="col-6">
            <div class="card-decision border-success" onclick="mostrarFluxo('sim')">
                <h2 class="text-success fw-bold">SIM</h2>
                <p class="text-muted m-0 small">IP Conhecido</p>
            </div>
        </div>
        <div class="col-6">
            <div class="card-decision border-danger" onclick="mostrarFluxo('nao')">
                <h2 class="text-danger fw-bold">NÃO</h2>
                <p class="text-muted m-0 small">IP Desconhecido</p>
            </div>
        </div>
    </div>

    <div id="area-passos">
        <button class="btn btn-sm btn-outline-light mb-4" onclick="voltar()">← VOLTAR AO INÍCIO</button>
        <div id="conteudo-passos"></div>
    </div>
</div>

<script>
    function mostrarFluxo(resposta) {
        document.getElementById('pergunta-inicial').style.display = 'none';
        document.getElementById('area-passos').style.display = 'block';
        const cont = document.getElementById('conteudo-passos');

        if(resposta === 'sim') {
            cont.innerHTML = `
                <h4 class="text-success mb-4 text-uppercase">Cenário: IP Configurado</h4>
                <div class="passo-box">
                    <strong>1. Diagnóstico Web (HTTP)</strong>
                    <p class="small text-muted mt-2">
                        <span class="ferramenta-badge">Navegador</span> Digite o IP no browser. Confira estatísticas de portas e erros de rede (conforme fotos de referência).
                    </p>
                </div>
                <div class="passo-box">
                    <strong>2. Estabilidade (Ping)</strong>
                    <p class="small text-muted mt-2">
                        <span class="ferramenta-badge">CMD</span> Use <code>ping [IP] -t</code>. Se houver perda, verifique os cabos nas portas P1/P2.
                    </p>
                </div>
                <div class="passo-box">
                    <strong>3. Verificação RSWho</strong>
                    <p class="small text-muted mt-2">
                        <span class="ferramenta-badge">RSLinx Classic</span> Use o driver <i>EtherNet/IP</i>. O módulo deve aparecer identificado pelo ícone correto.
                    </p>
                </div>
            `;
        } else {
            cont.innerHTML = `
                <h4 class="text-danger mb-4 text-uppercase">Cenário: Sem IP / Perda de Acesso</h4>
                <div class="passo-box border-warning">
                    <strong class="text-warning">1. Posição dos Switches (Hardware)</strong>
                    <p class="small text-muted mt-2">
                        Verifique S1-S2-S3:
                        <br>• <b>001-254</b>: IP será 192.168.1.XXX.
                        <br>• <b>000</b>: Aguarda IP via BootP DHCP Tool.
                        <br>• <b>888</b>: Factory Reset (limpa tudo).
                    </p>
                </div>
                <div class="passo-box">
                    <strong>2. Atribuição via BootP Tool</strong>
                    <p class="small text-muted mt-2">
                        <span class="ferramenta-badge">Software</span> Capture o pedido do MAC ID, adicione a relação com o IP desejado e clique obrigatoriamente em <b>"Disable BootP/DHCP"</b>.
                    </p>
                </div>
            `;
        }
    }
    function voltar() {
        document.getElementById('pergunta-inicial').style.display = 'flex';
        document.getElementById('area-passos').style.display = 'none';
    }
</script>
</body>
</html>
